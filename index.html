<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Campus3D — Immersive Learning Platform</title>

  <!-- Tailwind CDN (dev only) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #00CED1;
      --bg-dark: #020617;
    }

    body {
      margin: 0;
      background: var(--bg-dark);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: white;
      overflow-x: hidden;
    }

    /* 🔥 APP ROOT */
    #app {
      height: 100vh;
      overflow-y: auto;
    }

    /* 🔥 LANDING */
    #landing-page {
      position: relative;
      min-height: 100vh;
      background: radial-gradient(circle at center, #083344 0%, #020617 100%);
    }

    /* 🔥 GLASS CARD */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* 🔥 OVERLAY */
    #ui-overlay {
      position: fixed;
      inset: 0;
      background: #020617;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
  </style>
</head>

<body>

  <!-- ================= LANDING ================= -->
  <div id="landing-page">

    <!-- HEADER -->
    <header class="flex justify-between items-center px-8 py-5 border-b border-white/5">
      <h1 class="text-2xl font-extrabold">
        CAMPUS<span class="text-[#00CED1]">3D</span>
      </h1>
    </header>

    <!-- HERO -->
    <section class="pt-24 pb-16 px-6 text-center">

      <h2 class="text-5xl font-extrabold mb-6 leading-tight">
        Campus3D Makes it Real
      </h2>

      <p class="text-gray-400 max-w-xl mx-auto">
        Platform pembelajaran imersif berbasis 3D langsung dari browser.
        Belajar, berinteraksi, dan berkembang dalam dunia digital nyata.
      </p>

      <!-- ROLE BUTTON -->
      <div class="mt-10 flex flex-col gap-4 items-center">

        <button id="teacherBtn"
          class="bg-[#00CED1] text-black px-8 py-4 rounded-xl font-bold hover:scale-105 transition">
          Jadi Pengajar
        </button>

        <button id="studentBtn"
          class="border border-[#00CED1] px-8 py-4 rounded-xl hover:bg-white/5 transition">
          Jadi Siswa
        </button>

      </div>

    </section>

    <!-- 🔥 CLASS SECTION -->
    <section id="classes" class="pb-20 px-6">

      <h2 class="text-3xl font-bold text-center mb-10">
        Kelas di Campus3D
      </h2>

      <div id="landingClasses"
        class="grid md:grid-cols-3 gap-6 max-w-6xl mx-auto">
      </div>

    </section>

  </div>

  <!-- ================= APP ROOT ================= -->
  <div id="app"></div>

  <!-- ================= OVERLAY ================= -->
  <div id="ui-overlay">
    <p class="text-[#00CED1] font-bold text-lg animate-pulse">
      Loading...
    </p>
  </div>

  <!-- ================= MAIN ENTRY ================= -->
  <script type="module" src="/src/main.ts"></script>

</body>

</html>
